<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ebad Ali Education Hub</title><style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg, #1e3c72, #2a5298);
    color: white;
}

header {
    text-align: center;
    padding: 30px;
    animation: fadeIn 2s;
}

h1 {
    font-size: 40px;
}

.container {
    width: 90%;
    max-width: 800px;
    margin: auto;
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    animation: slideUp 1.5s;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
}

button {
    padding: 10px 20px;
    background: #00c6ff;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #0072ff;
}

.question-box {
    margin-top: 20px;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 5px;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {transform: translateY(50px); opacity: 0;}
    to {transform: translateY(0); opacity: 1;}
}

</style></head><body><header>
    <h1>Ebad Ali Education Hub 🎓</h1>
    <p>Ask questions, learn, and grow!</p>
</header><div class="container" id="loginSection">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="login()">Login</button>
</div><div class="container" id="mainSection" style="display:none;">
    <h2>Ask a Question</h2>
    <textarea id="question" placeholder="Type your question here..."></textarea>
    <button onclick="postQuestion()">Post Question</button><div id="questionsList"></div
